<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DAPRES Parent Portal</title>
<meta name="theme-color" content="#2e7d32">
<meta name="description" content="Keeping you close to their day — DAPRES Parent Portal.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2e7d32;
    --sienna: #a0522d;
    --bg: #f3f5f0;
    --white: #fff;
    --text: #222;
    --muted: #6b6b6b;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Poppins", sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    overscroll-behavior-y: none;
  }

  .app { display: flex; min-height: 100vh; }
  .sidebar { display: none; }
  .main { flex: 1; min-width: 0; }

  /* ── Loading screen ───────────────────────────────────────── */
  #loading-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg, var(--green), var(--sienna));
    background-size: 200% 200%;
    animation: gradientShift 6s ease infinite;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: white; text-align: center; padding: 24px;
    transition: opacity 0.4s ease, visibility 0.4s ease;
  }
  #loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  #loading-screen .crest {
    width: 84px; height: 84px; border-radius: 50%; overflow: hidden;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.4); margin-bottom: 18px;
    animation: crestPulse 1.8s ease-in-out infinite;
  }
  #loading-screen .crest img { width: 100%; height: 100%; object-fit: cover; display: block; }
  @keyframes crestPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  #loading-screen h2 { font-size: 16px; font-weight: 700; margin: 0 0 4px; }
  #loading-screen .sub { font-size: 12px; opacity: 0.9; }
  #loading-screen .spinner {
    width: 26px; height: 26px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.35); border-top-color: white;
    margin-top: 22px; animation: spin 0.8s linear infinite;
  }
  #loading-screen .status-line { font-size: 11px; opacity: 0.8; margin-top: 14px; min-height: 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes gradientShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

  /* ── Top header ───────────────────────────────────────────── */
  .topbar {
    background: linear-gradient(135deg, var(--green), var(--sienna));
    background-size: 200% 200%;
    animation: gradientShift 10s ease infinite;
    color: white;
    padding: 20px 18px 18px;
    text-align: center;
  }
  .crest-img {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: white;
    margin: 0 auto 8px;
    overflow: hidden;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.35);
  }
  .crest-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .topbar .school { font-size: 12px; opacity: 0.9; }
  .topbar h1 { font-size: 19px; font-weight: 700; margin: 2px 0 0; }
  .topbar .slogan { font-style: italic; opacity: 0.9; font-size: 12px; margin-top: 2px; }

  .content { padding: 18px 16px 90px; max-width: 1100px; margin: 0 auto; position: relative; }

  .view { display: none; }
  .view.active { display: block; animation: viewIn 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes viewIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .section-title { font-size: 15px; font-weight: 700; margin: 0 0 12px; }
  .section-sub { font-size: 12px; color: var(--muted); margin: -8px 0 14px; }

  /* ── Student switcher chips ───────────────────────────────── */
  #student-switcher { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 2px; }
  #student-switcher.hidden { display: none; }
  .student-chip {
    flex-shrink: 0; display: flex; align-items: center; gap: 6px;
    background: var(--white); border: 1px solid transparent; border-radius: 20px;
    padding: 6px 12px 6px 6px; font-size: 12px; font-weight: 600; color: var(--muted);
    cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.06); transition: all 0.15s ease;
  }
  .student-chip .chip-avatar {
    width: 22px; height: 22px; border-radius: 50%; background: var(--bg);
    display: flex; align-items: center; justify-content: center; font-size: 10px;
    font-weight: 700; color: var(--green);
  }
  .student-chip.active { color: var(--green); border-color: var(--green); background: #e6f2e6; }

  .card {
    background: var(--white); border-radius: 15px; padding: 18px; margin-bottom: 14px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    transition: transform 0.2s ease, box-shadow 0.25s ease;
    opacity: 0; animation: fadeUp 0.5s ease forwards;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 10px 22px rgba(0,0,0,0.12); }
  .card.accent { border-left: 5px solid var(--green); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .view .card:nth-child(1) { animation-delay: 0.03s; }
  .view .card:nth-child(2) { animation-delay: 0.1s; }
  .view .card:nth-child(3) { animation-delay: 0.17s; }
  .view .card:nth-child(4) { animation-delay: 0.24s; }
  .grid-2 .left-col .card:nth-child(1) { animation-delay: 0.03s; }
  .grid-2 .left-col .card:nth-child(2) { animation-delay: 0.11s; }
  .grid-2 .left-col .card:nth-child(3) { animation-delay: 0.19s; }
  .grid-2 .right-col .card:nth-child(1) { animation-delay: 0.07s; }

  .empty-state { text-align: center; padding: 30px 16px; color: var(--muted); font-size: 13px; }
  .empty-state .big { font-size: 32px; margin-bottom: 10px; }

  .student-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .student-row .label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .student-row .name { font-size: 16px; font-weight: 700; }
  .student-row .meta { font-size: 13px; color: #555; margin-top: 2px; }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%; background: var(--bg);
    display: flex; align-items: center; justify-content: center; color: var(--green);
    font-size: 14px; font-weight: 700; flex-shrink: 0; transition: transform 0.2s ease;
  }
  .card:hover .avatar { transform: scale(1.08); }

  .status-card { text-align: center; }
  .status-card .date { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .status-ring {
    width: 76px; height: 76px; border-radius: 50%; background: var(--green);
    display: flex; align-items: center; justify-content: center; margin: 0 auto 10px;
    color: white; font-size: 28px;
    animation: ringPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both,
               ringPulse 2.4s ease-in-out 0.9s infinite;
  }
  .status-ring.late { background: var(--sienna); }
  .status-ring.absent { background: #c0392b; }
  .status-ring.pending { background: #9e9e9e; }
  @keyframes ringPop { from { transform: scale(0); } to { transform: scale(1); } }
  @keyframes ringPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(46,125,50,0.35); } 50% { box-shadow: 0 0 0 8px rgba(46,125,50,0); } }
  .status-card .status { font-size: 15px; color: var(--green); font-weight: 700; }
  .status-card .detail { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .week-label { font-size: 12px; color: #555; font-weight: 600; margin-bottom: 8px; }
  .week-grid { display: flex; gap: 6px; }
  .day-cell {
    flex: 1; text-align: center; background: var(--white); border-radius: 10px; padding: 8px 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    opacity: 0; animation: fadeUp 0.4s ease forwards;
    transition: transform 0.15s ease;
  }
  .day-cell:hover { transform: translateY(-2px); }
  .day-cell:nth-child(1) { animation-delay: 0.3s; }
  .day-cell:nth-child(2) { animation-delay: 0.35s; }
  .day-cell:nth-child(3) { animation-delay: 0.4s; }
  .day-cell:nth-child(4) { animation-delay: 0.45s; }
  .day-cell:nth-child(5) { animation-delay: 0.5s; }
  .day-cell .day { font-size: 10px; color: var(--muted); }
  .day-cell .dot { width: 8px; height: 8px; border-radius: 50%; margin: 6px auto 0; transition: transform 0.2s ease; }
  .dot-ontime { background: var(--green); }
  .dot-late { background: var(--sienna); }
  .dot-absent { background: #c0392b; }
  .dot-upcoming { background: #ccc; }
  .legend { display: flex; gap: 12px; margin-top: 8px; font-size: 10px; color: var(--muted); flex-wrap: wrap; }
  .legend .sw { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }

  .notif-row { display: flex; gap: 10px; align-items: flex-start; }
  .notif-row + .notif-row { margin-top: 14px; padding-top: 14px; border-top: 1px solid #eee; }
  .notif-row .icon-badge {
    width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 14px; flex-shrink: 0; transition: transform 0.2s ease;
  }
  .notif-row:hover .icon-badge { transform: scale(1.1) rotate(-4deg); }
  .icon-badge.late { background: #fbe9e1; color: var(--sienna); }
  .icon-badge.ontime { background: #e6f2e6; color: var(--green); }
  .icon-badge.info { background: #eef1fb; color: #4a5cc9; }
  .icon-badge.absent { background: #fbe4e1; color: #c0392b; }
  .notif-row .title { font-size: 13px; }
  .notif-row .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .notif-row .when { font-size: 10px; color: #aaa; margin-left: auto; white-space: nowrap; padding-left: 8px; }

  .btn {
    width: 100%; background: var(--green); color: white; border: none; border-radius: 8px;
    padding: 12px; font-weight: 700; font-family: "Poppins", sans-serif; cursor: pointer;
    font-size: 14px; transition: background 0.2s ease, transform 0.12s ease;
  }
  .btn:hover { background: var(--sienna); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn.secondary { background: var(--white); color: var(--green); border: 1px solid var(--green); }
  .btn.secondary:hover { background: var(--bg); }

  /* ── Attendance calendar ──────────────────────────────────── */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-header .month { font-size: 14px; font-weight: 600; }
  .cal-nav { display: flex; gap: 6px; }
  .cal-nav button {
    background: var(--bg); border: none; border-radius: 6px; width: 26px; height: 26px;
    cursor: pointer; color: var(--green); font-weight: 700; transition: background 0.15s ease, transform 0.12s ease;
  }
  .cal-nav button:hover { background: #e2e6dd; }
  .cal-nav button:active { transform: scale(0.9); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
  .cal-grid .dow { font-size: 10px; color: var(--muted); padding-bottom: 4px; }
  .cal-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-size: 12px; opacity: 0; animation: fadeUp 0.3s ease forwards;
    transition: transform 0.15s ease;
  }
  .cal-cell:not(.blank):hover { transform: scale(1.12); }
  .cal-cell.blank { visibility: hidden; }
  .cal-cell.ontime { background: #e6f2e6; color: var(--green); font-weight: 600; }
  .cal-cell.late { background: #fbe9e1; color: var(--sienna); font-weight: 600; }
  .cal-cell.absent { background: #fbe4e1; color: #c0392b; font-weight: 600; }
  .cal-cell.weekend { color: #ccc; }

  .stat-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .stat-box {
    flex: 1; background: var(--white); border-radius: 12px; padding: 12px; text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06); opacity: 0; animation: fadeUp 0.45s ease forwards;
    transition: transform 0.2s ease;
  }
  .stat-box:hover { transform: translateY(-3px); }
  .stat-box:nth-child(1) { animation-delay: 0.05s; }
  .stat-box:nth-child(2) { animation-delay: 0.12s; }
  .stat-box:nth-child(3) { animation-delay: 0.19s; }
  .stat-box .num { font-size: 18px; font-weight: 700; }
  .stat-box .lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .stat-box.ontime .num { color: var(--green); }
  .stat-box.late .num { color: var(--sienna); }
  .stat-box.absent .num { color: #c0392b; }

  .log-row {
    display: flex; justify-content: space-between; align-items: center; padding: 10px 0;
    border-top: 1px solid #eee; font-size: 13px; transition: padding-left 0.15s ease;
  }
  .log-row:hover { padding-left: 4px; }
  .log-row:first-of-type { border-top: none; }
  .log-row .date { color: var(--muted); font-size: 12px; }
  .pill { font-size: 10px; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
  .pill.ontime { background: #e6f2e6; color: var(--green); }
  .pill.late { background: #fbe9e1; color: var(--sienna); }
  .pill.absent { background: #fbe4e1; color: #c0392b; }

  /* ── Settings ─────────────────────────────────────────────── */
  .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-top: 1px solid #eee; }
  .settings-row:first-of-type { border-top: none; }
  .settings-row .lbl { font-size: 13px; }
  .settings-row .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .settings-row input {
    border: none; border-bottom: 1px solid #ddd; font-family: "Poppins", sans-serif;
    font-size: 12px; color: var(--muted); text-align: right; background: transparent; padding: 4px 0;
  }
  .settings-row input:focus { outline: none; border-color: var(--green); }
  .toggle { width: 40px; height: 22px; border-radius: 20px; background: #ccc; position: relative; cursor: pointer; flex-shrink: 0; transition: background 0.2s ease; }
  .toggle.on { background: var(--green); }
  .toggle::after { content: ""; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: white; transition: left 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .toggle.on::after { left: 20px; }
  .child-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-top: 1px solid #eee; transition: padding-left 0.15s ease; }
  .child-row:hover { padding-left: 4px; }
  .child-row:first-of-type { border-top: none; }
  .child-row .name { font-size: 13px; font-weight: 600; }
  .child-row .meta { font-size: 11px; color: var(--muted); }

  /* ── Link-code modal ──────────────────────────────────────── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex;
    align-items: center; justify-content: center; z-index: 500; padding: 20px;
    opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease;
  }
  .modal-backdrop.active { opacity: 1; visibility: visible; }
  .modal-box {
    background: white; border-radius: 16px; padding: 22px; width: 100%; max-width: 340px;
    transform: translateY(10px); transition: transform 0.2s ease;
  }
  .modal-backdrop.active .modal-box { transform: translateY(0); }
  .modal-box h3 { margin: 0 0 6px; font-size: 16px; }
  .modal-box p { font-size: 12px; color: var(--muted); margin: 0 0 14px; }
  .modal-box input {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 18px;
    letter-spacing: 3px; text-align: center; text-transform: uppercase; font-family: "Poppins", sans-serif;
    margin-bottom: 10px;
  }
  .modal-box input:focus { outline: none; border-color: var(--green); }
  .modal-box .error-msg { color: #c0392b; font-size: 12px; margin: -4px 0 10px; min-height: 14px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 6px; }

  /* ── Toast ────────────────────────────────────────────────── */
  #toast {
    position: fixed; left: 50%; bottom: 100px; transform: translateX(-50%) translateY(20px);
    background: #222; color: white; font-size: 12px; padding: 10px 16px; border-radius: 20px;
    z-index: 600; opacity: 0; visibility: hidden; transition: all 0.25s ease; max-width: 90%; text-align: center;
  }
  #toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

  /* ── Bottom tab bar (mobile) ─────────────────────────────── */
  .tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); box-shadow: 0 -2px 8px rgba(0,0,0,0.06); display: flex; padding: 10px 0 12px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  .tabbar .tab {
    flex: 1; text-align: center; color: #aaa; font-size: 9px; background: none; border: none;
    font-family: "Poppins", sans-serif; cursor: pointer; position: relative; padding-top: 4px;
    transition: color 0.2s ease;
  }
  .tabbar .tab.active { color: var(--green); font-weight: 600; }
  .tabbar .tab .icon { font-size: 19px; display: block; margin-bottom: 2px; transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .tabbar .tab.active .icon { transform: translateY(-2px) scale(1.12); }
  #tab-indicator { position: absolute; top: 0; height: 2px; background: var(--green); border-radius: 2px; transition: left 0.28s cubic-bezier(0.65, 0, 0.35, 1), width 0.28s cubic-bezier(0.65, 0, 0.35, 1); }

  /* ── Desktop layout (≥900px) ─────────────────────────────── */
  @media (min-width: 900px) {
    .sidebar { display: flex; flex-direction: column; width: 220px; flex-shrink: 0; background: var(--white); box-shadow: 2px 0 8px rgba(0,0,0,0.05); padding: 24px 0; position: relative; }
    .sidebar .crest-img { width: 44px; height: 44px; box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--green); margin: 0 auto 10px; }
    .sidebar .school-name { text-align: center; font-size: 12px; color: var(--muted); padding: 0 20px; margin-bottom: 30px; }
    .sidebar nav { display: flex; flex-direction: column; gap: 4px; padding: 0 12px; position: relative; }
    .sidebar nav button {
      display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
      padding: 10px 14px; border-radius: 8px; border: none; background: none;
      color: var(--muted); font-size: 14px; font-weight: 500; font-family: "Poppins", sans-serif;
      cursor: pointer; position: relative; z-index: 1; transition: color 0.2s ease;
    }
    .sidebar nav button.active { color: var(--green); font-weight: 600; }
    .sidebar nav button .icon { font-size: 18px; width: 18px; text-align: center; transition: transform 0.2s ease; }
    .sidebar nav button:hover .icon { transform: scale(1.15); }
    #sidebar-indicator { position: absolute; left: 12px; right: 12px; height: 38px; background: var(--bg); border-radius: 8px; z-index: 0; transition: top 0.28s cubic-bezier(0.65, 0, 0.35, 1); }
    .tabbar { display: none; }
    .topbar { text-align: left; display: flex; align-items: center; justify-content: space-between; padding: 24px 36px; }
    .topbar .header-left { display: flex; align-items: center; gap: 14px; }
    .topbar .crest-img { margin: 0; }
    .topbar .titles { text-align: left; }
    .topbar h1 { font-size: 22px; }
    .content { padding: 28px 36px 40px; }
    .grid-2 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 18px; align-items: start; }
    .grid-2 .left-col, .grid-2 .right-col { display: flex; flex-direction: column; }
    .cal-cell { font-size: 13px; }
  }

  .icon::before { content: attr(data-icon); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001s !important; transition-duration: 0.001s !important; }
  }
</style>
</head>
<body>

  <!-- ══════════ LOADING SCREEN ══════════ -->
  <div id="loading-screen">
    <div class="crest"><img src="icons/icon-192.png" alt="DAPRES crest"></div>
    <h2>DAPRES Parent Portal</h2>
    <div class="sub">Keeping you close to their day</div>
    <div class="spinner"></div>
    <div class="status-line" id="loading-status">Connecting…</div>
  </div>

  <div class="app">

    <aside class="sidebar">
      <div class="crest-img"><img src="icons/icon-192.png" alt="DAPRES school logo"></div>
      <div class="school-name">Dr. Alfredo Pio De Roda Elementary School</div>
      <nav>
        <div id="sidebar-indicator"></div>
        <button class="nav-btn active" data-view="home"><span class="icon" data-icon="&#8962;"></span> Home</button>
        <button class="nav-btn" data-view="attendance"><span class="icon" data-icon="&#128197;"></span> Attendance</button>
        <button class="nav-btn" data-view="alerts"><span class="icon" data-icon="&#128276;"></span> Alerts</button>
        <button class="nav-btn" data-view="settings"><span class="icon" data-icon="&#9881;"></span> Settings</button>
      </nav>
    </aside>

    <div class="main">
      <div class="topbar">
        <div class="header-left">
          <div class="crest-img"><img src="icons/icon-192.png" alt="DAPRES school logo"></div>
          <div class="titles">
            <div class="school">Dr. Alfredo Pio De Roda Elementary School</div>
            <h1>Parent portal</h1>
            <div class="slogan">Keeping you close to their day</div>
          </div>
        </div>
      </div>

      <div class="content">

        <div id="student-switcher" class="hidden"></div>

        <!-- ══════════ HOME ══════════ -->
        <div class="view active" id="view-home"></div>

        <!-- ══════════ ATTENDANCE ══════════ -->
        <div class="view" id="view-attendance"></div>

        <!-- ══════════ ALERTS ══════════ -->
        <div class="view" id="view-alerts"></div>

        <!-- ══════════ SETTINGS ══════════ -->
        <div class="view" id="view-settings"></div>

      </div>
    </div>
  </div>

  <div class="tabbar">
    <div id="tab-indicator"></div>
    <button class="tab active" data-view="home"><span class="icon" data-icon="&#8962;"></span>Home</button>
    <button class="tab" data-view="attendance"><span class="icon" data-icon="&#128197;"></span>Attendance</button>
    <button class="tab" data-view="alerts"><span class="icon" data-icon="&#128276;"></span>Alerts</button>
    <button class="tab" data-view="settings"><span class="icon" data-icon="&#9881;"></span>Settings</button>
  </div>

  <!-- ══════════ Link student modal ══════════ -->
  <div class="modal-backdrop" id="link-modal">
    <div class="modal-box">
      <h3>Link a student</h3>
      <p>Enter the code given to you by the school office.</p>
      <input type="text" id="link-code-input" maxlength="6" placeholder="ABC123" autocomplete="off" autocapitalize="characters">
      <div class="error-msg" id="link-code-error"></div>
      <div class="modal-actions">
        <button class="btn secondary" id="link-cancel-btn" style="width:auto; flex:1;">Cancel</button>
        <button class="btn" id="link-submit-btn" style="width:auto; flex:1;">Link</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
